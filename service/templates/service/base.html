{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HigiFlow{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
    <link rel="stylesheet" href="{% static 'service/css/dashboard.css' %}">
</head>
<body class="higiflow-app">
    <div class="hf-shell">
        <aside class="hf-sidebar">
            <div class="hf-brand">
                <span class="hf-brand-mark">HF</span>
                <small>HigiFlow - Gestão simplificada</small>
            </div>

            <nav class="hf-nav" aria-label="Menu principal">
                <a href="{% url 'inicio' %}" class="hf-nav-link{% if request.resolver_match.url_name == 'inicio' %} active{% endif %}">
                    <i class="bi bi-columns-gap"></i>
                    <span>Início</span>
                </a>
                <a href="{% url 'catalogo' %}" class="hf-nav-link{% if request.resolver_match.url_name == 'catalogo' or request.resolver_match.url_name == 'novo_produto' %} active{% endif %}">
                    <i class="bi bi-people"></i>
                    <span>Leads</span>
                </a>
                <a href="{% url 'orcamentos' %}" class="hf-nav-link{% if request.resolver_match.url_name == 'orcamentos' or request.resolver_match.url_name == 'novo_orcamento' or request.resolver_match.url_name == 'orcamento_detalhe' %} active{% endif %}">
                    <i class="bi bi-file-earmark-text"></i>
                    <span>Orçamentos</span>
                </a>
                <a href="{% url 'catalogo' %}" class="hf-nav-link">
                    <i class="bi bi-clipboard-check"></i>
                    <span>Ordens de Serviço</span>
                </a>
                <a href="{% url 'catalogo' %}" class="hf-nav-link">
                    <i class="bi bi-calendar3"></i>
                    <span>Agenda</span>
                </a>
                <a href="{% url 'clientes' %}" class="hf-nav-link{% if request.resolver_match.url_name == 'clientes' %} active{% endif %}">
                    <i class="bi bi-person-circle"></i>
                    <span>Clientes</span>
                </a>
                <a href="{% url 'catalogo' %}" class="hf-nav-link">
                    <i class="bi bi-gear"></i>
                    <span>Configurações</span>
                </a>
            </nav>
        </aside>

        <div class="hf-main">
            <header class="hf-topbar">
                <form class="hf-search" method="get" action="{% url 'catalogo' %}">
                    <i class="bi bi-search"></i>
                    <input type="search" name="q" placeholder="Buscar..." aria-label="Buscar">
                </form>

                <div class="hf-userbar">
                    <button type="button" class="hf-notification" aria-label="Notificações">
                        <i class="bi bi-bell"></i>
                    </button>
                    <div class="hf-user">
                        <span class="hf-avatar">JD</span>
                        <div>
                            <strong>João Silva</strong>
                            <span>Administrador</span>
                        </div>
                        <i class="bi bi-chevron-down text-secondary"></i>
                    </div>
                </div>
            </header>

            <main class="hf-content">
                {% if messages %}
                    <script>
                        window.hfPendingAlerts = [
                            {% for message in messages %}
                                {
                                    tag: "{{ message.tags|default:'success'|escapejs }}",
                                    text: "{{ message|escapejs }}",
                                },
                            {% endfor %}
                        ];
                    </script>
                {% endif %}

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (() => {
            const alertDefaults = {
                buttonsStyling: false,
                customClass: {
                    popup: "hf-swal-popup",
                    title: "hf-swal-title",
                    htmlContainer: "hf-swal-text",
                    confirmButton: "hf-swal-confirm",
                    cancelButton: "hf-swal-cancel",
                    actions: "hf-swal-actions",
                },
                confirmButtonText: "Ok",
            };

            const iconByTag = {
                success: "success",
                error: "error",
                danger: "error",
                warning: "warning",
                info: "info",
            };

            const titleByIcon = {
                success: "Tudo certo",
                error: "Atenção",
                warning: "Atenção",
                info: "Aviso",
                question: "Confirmar ação",
            };

            function normalizeIcon(tag) {
                const firstTag = (tag || "success").split(" ")[0];
                return iconByTag[firstTag] || "success";
            }

            window.hfAlert = function hfAlert(options) {
                const icon = options.icon || normalizeIcon(options.tag);
                return Swal.fire({
                    ...alertDefaults,
                    icon,
                    title: options.title || titleByIcon[icon],
                    text: options.text || "",
                });
            };

            document.addEventListener("DOMContentLoaded", () => {
                if (!window.Swal) {
                    return;
                }

                (window.hfPendingAlerts || []).forEach((message) => {
                    window.hfAlert(message);
                });

                document.addEventListener("submit", (event) => {
                    const form = event.target.closest("form[data-hf-confirm]");
                    if (!form || form.dataset.hfConfirmed === "true") {
                        return;
                    }

                    event.preventDefault();
                    Swal.fire({
                        ...alertDefaults,
                        icon: form.dataset.hfConfirmIcon || "question",
                        title: form.dataset.hfConfirmTitle || "Confirmar ação",
                        text: form.dataset.hfConfirmText || "Deseja continuar?",
                        showCancelButton: true,
                        confirmButtonText: form.dataset.hfConfirmButton || "Confirmar",
                        cancelButtonText: form.dataset.hfCancelButton || "Cancelar",
                    }).then((result) => {
                        if (result.isConfirmed) {
                            form.dataset.hfConfirmed = "true";
                            form.submit();
                        }
                    });
                });
            });
        })();
    </script>
</body>
</html>
